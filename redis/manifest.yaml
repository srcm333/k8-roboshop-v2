apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db
spec:
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 # container port
  clusterIP: None # headless service
  selector:
    project: roboshop
    component: redis
    tier: db
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db
spec:
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 # container port
  selector:
    project: roboshop
    component: redis
    tier: db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db
spec:
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: db
  serviceName: "redis-headless"
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        component: redis
        tier: db
    spec:
      containers:
      - name: redis
        image: redis:7
        volumeMounts:
        - name: redis
          mountPath: /data
  # PVC
  volumeClaimTemplates:
  - metadata:
      name: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi